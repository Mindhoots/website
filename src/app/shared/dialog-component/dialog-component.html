<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  @for (itm of data.content; track itm; let i = $index) {
    <h3 class="font-bold">{{ itm.title }}</h3>
    <p class="whitespace-pre-line pl-4 leading-relaxed">{{ itm.message }}</p>
  }
  <a href="mailto:mindhoots@gmail.com" target="_blank" class="whitespace-pre-line pl-4 leading-relaxed cursor-pointer sec-heading-gradient"> mindhoots@gmail.com </a>
  <br/><br/>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button matButton mat-dialog-close>Close</button>
</mat-dialog-actions>
